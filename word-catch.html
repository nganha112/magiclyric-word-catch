<script>
// ===== IMAGE ASSETS =====
const bgImg = new Image();
bgImg.src = 'asset/bg.png';
const catDefaultImg = new Image();
catDefaultImg.src = 'asset/cat_default.svg';
const catOpenImg = new Image();
catOpenImg.src = 'asset/cat_open.svg';
const logoImg = new Image();
logoImg.src = 'asset/logo.png';
const catCelebrateImg = new Image();
catCelebrateImg.src = 'asset/cat_celebrate.svg';
const catRelearnImg = new Image();
catRelearnImg.src = 'asset/cat_relearn.svg';
let catMouthOpen = false;
let catMouthTimer = 0;

// ===== KAWAII PALETTE =====
const CREAM = '#FFF5E6';
const SOFT_PINK = '#F8D7DA';
const LIGHT_BROWN = '#D4A574';
const BABY_BLUE = '#B8E6F0';
const WARM_BROWN = '#8B6B4A';
const DARK_BROWN = '#5C3D2E';
const LAVENDER = '#E8D5F5';
const MINT = '#C8F0D4';
const PEACH = '#FDDCB5';
const ROSE = '#F2A6B3';

const PILL_COLORS = [SOFT_PINK, LAVENDER, MINT, PEACH, BABY_BLUE, '#F5E0C3', ROSE, '#D4EAF7'];
const OUTLINE_W = 2.5;

// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, scale;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 400, H / 700);
}
resize();
window.addEventListener('resize', resize);

// ===== AUDIO =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.linearRampToValueAtTime(784, now + 0.1);
      osc.frequency.linearRampToValueAtTime(1047, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.linearRampToValueAtTime(100, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
    } else if (type === 'combo') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, now);
      osc.frequency.linearRampToValueAtTime(880, now + 0.1);
      osc.frequency.linearRampToValueAtTime(1320, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'countdown') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'go') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    }
  } catch(e) {}
}

// ===== BACKGROUND MUSIC =====
let musicNodes = null;
const BPM = 128;
const BEAT = 60 / BPM;
const BASS_NOTES = [130.81, 146.83, 164.81, 196.00, 220.00, 196.00, 164.81, 146.83];
const MELODY_NOTES = [
  523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33,
  523.25, 440.00, 523.25, 587.33, 659.25, 783.99, 659.25, 523.25
];

function startMusic() {
  stopMusic();
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(audioCtx.destination);
    const kickGain = audioCtx.createGain();
    kickGain.gain.value = 0;
    kickGain.connect(masterGain);
    const bassOsc = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    const bassFilter = audioCtx.createBiquadFilter();
    bassOsc.type = 'sawtooth';
    bassFilter.type = 'lowpass';
    bassFilter.frequency.value = 300;
    bassOsc.connect(bassFilter);
    bassFilter.connect(bassGain);
    bassGain.gain.value = 0.5;
    bassGain.connect(masterGain);
    bassOsc.start();
    const melOsc = audioCtx.createOscillator();
    const melGain = audioCtx.createGain();
    const melFilter = audioCtx.createBiquadFilter();
    melOsc.type = 'triangle';
    melFilter.type = 'lowpass';
    melFilter.frequency.value = 2000;
    melOsc.connect(melFilter);
    melFilter.connect(melGain);
    melGain.gain.value = 0.25;
    melGain.connect(masterGain);
    melOsc.start();
    const bufferSize = audioCtx.sampleRate * 0.05;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const hatGain = audioCtx.createGain();
    hatGain.gain.value = 0;
    const hatFilter = audioCtx.createBiquadFilter();
    hatFilter.type = 'highpass';
    hatFilter.frequency.value = 8000;
    hatFilter.connect(hatGain);
    hatGain.connect(masterGain);
    let beatIndex = 0;
    const startTime = audioCtx.currentTime + 0.1;
    function scheduleBeat() {
      if (!musicNodes) return;
      const now = audioCtx.currentTime;
      const beatTime = startTime + beatIndex * BEAT;
      if (beatTime > now + 2) { setTimeout(scheduleBeat, 200); return; }
      const bassIdx = Math.floor(beatIndex / 2) % BASS_NOTES.length;
      bassOsc.frequency.setValueAtTime(BASS_NOTES[bassIdx], beatTime);
      bassGain.gain.setValueAtTime(0.5, beatTime);
      bassGain.gain.linearRampToValueAtTime(0.25, beatTime + BEAT * 1.5);
      const melIdx = beatIndex % MELODY_NOTES.length;
      if (beatIndex % 2 === 0 || Math.random() > 0.4) {
        melOsc.frequency.setValueAtTime(MELODY_NOTES[melIdx], beatTime);
        melGain.gain.setValueAtTime(0.25, beatTime);
        melGain.gain.linearRampToValueAtTime(0.05, beatTime + BEAT * 0.8);
      } else { melGain.gain.setValueAtTime(0.0, beatTime); }
      if (beatIndex % 4 === 0 || beatIndex % 4 === 2) {
        const kickOsc = audioCtx.createOscillator();
        const kGain = audioCtx.createGain();
        kickOsc.type = 'sine';
        kickOsc.frequency.setValueAtTime(150, beatTime);
        kickOsc.frequency.exponentialRampToValueAtTime(40, beatTime + 0.12);
        kGain.gain.setValueAtTime(0.7, beatTime);
        kGain.gain.linearRampToValueAtTime(0, beatTime + 0.15);
        kickOsc.connect(kGain); kGain.connect(masterGain);
        kickOsc.start(beatTime); kickOsc.stop(beatTime + 0.2);
      }
      try {
        const hs = audioCtx.createBufferSource();
        hs.buffer = noiseBuffer;
        hs.connect(hatFilter);
        const vol = (beatIndex % 2 === 1) ? 0.15 : 0.08;
        hatGain.gain.setValueAtTime(vol, beatTime);
        hatGain.gain.linearRampToValueAtTime(0, beatTime + 0.05);
        hs.start(beatTime); hs.stop(beatTime + 0.05);
      } catch(e) {}
      beatIndex++;
      const nextBeatTime = startTime + beatIndex * BEAT;
      const delay = Math.max(10, (nextBeatTime - audioCtx.currentTime) * 1000 - 100);
      setTimeout(scheduleBeat, delay);
    }
    musicNodes = { masterGain, bassOsc, melOsc, scheduleBeat };
    scheduleBeat();
  } catch(e) { console.log('Music error:', e); }
}

function stopMusic() {
  if (!musicNodes) return;
  try {
    musicNodes.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    const nodes = musicNodes;
    musicNodes = null;
    setTimeout(() => {
      try { nodes.bassOsc.stop(); } catch(e) {}
      try { nodes.melOsc.stop(); } catch(e) {}
      try { nodes.masterGain.disconnect(); } catch(e) {}
    }, 600);
  } catch(e) { musicNodes = null; }
}
</script>
<script>
// ===== GAME STATE =====
let state = 'start'; // start, countdown, banner, playing, mastered, gameOver
let score = 0, lives = 3, combo = 0, maxCombo = 0;
let highScore = parseInt(localStorage.getItem('wordCatchHigh')) || 0;
let difficulty = 'medium';
let baseWord = null, challengeType = '';
let fallingWords = [], particles = [], floatingTexts = [];
let playerX = 0, playerTargetX = 0;
let roundTimer = 0;
let countdownValue = 3, countdownTimer = 0;
let screenShake = 0, flashColor = null, flashAlpha = 0;
let roundHistory = [];

// New multi-catch state
let wordIndex = 0;        // which WORDS entry we're on
let phase = 'synonym';    // 'synonym' or 'antonym'
let correctsNeeded = [];  // list of correct words to catch this phase
let correctsCaught = 0;   // how many caught so far
let totalCaught = 0;      // total correct caught across both phases for this word
let spawnQueue = [];       // words waiting to be spawned continuously
let spawnCooldown = 0;     // timer between spawns
let phaseNumber = 0;       // overall phase counter for display

// Banner / mastered transition state
let bannerText = '';
let bannerTimer = 0;
let masteredTimer = 0;

// Review state (when player fails a word)
let reviewTimer = 0;
let caughtSynonyms = new Set();   // tracks caught synonyms for current word
let caughtAntonyms = new Set();   // tracks caught antonyms for current word

// Confetti for mastered screen
let confetti = [];

// Start screen falling words
let startScreenWords = [];
function initStartScreenWords() {
  startScreenWords = [];
  for (let i = 0; i < 8; i++) {
    const entry = WORDS[Math.floor(Math.random() * WORDS.length)];
    const allW = [...entry.synonyms, ...entry.antonyms, entry.word];
    startScreenWords.push({
      text: allW[Math.floor(Math.random() * allW.length)],
      x: Math.random() * W,
      y: Math.random() * H,
      speed: Math.random() * 0.4 + 0.2,
      color: PILL_COLORS[Math.floor(Math.random() * PILL_COLORS.length)],
      alpha: 0.25 + Math.random() * 0.15,
      rotation: (Math.random() - 0.5) * 0.2
    });
  }
}
initStartScreenWords();

// ===== INPUT =====
let keys = {};
let touchX = null, touchActive = false;

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'start' && (e.key === 'Enter' || e.key === ' ')) startGame();
  if (state === 'gameOver' && (e.key === 'Enter' || e.key === ' ')) resetToStart();
  if (state === 'review' && (e.key === 'Enter' || e.key === ' ')) onReviewDone();
  if (state === 'start') {
    if (e.key === '1') difficulty = 'easy';
    if (e.key === '2') difficulty = 'medium';
    if (e.key === '3') difficulty = 'hard';
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = e.touches[0];
  if (state === 'start') {
    const cx = W / 2, cy = H * 0.62;
    if (Math.abs(t.clientX - cx) < 100 && Math.abs(t.clientY - cy) < 30) { startGame(); return; }
    const btnY = H * 0.74;
    const btnW = 70, gap = 15;
    const totalW = btnW * 3 + gap * 2;
    const startX = (W - totalW) / 2;
    if (t.clientY > btnY - 20 && t.clientY < btnY + 20) {
      if (t.clientX > startX && t.clientX < startX + btnW) difficulty = 'easy';
      else if (t.clientX > startX + btnW + gap && t.clientX < startX + btnW * 2 + gap) difficulty = 'medium';
      else if (t.clientX > startX + btnW * 2 + gap * 2 && t.clientX < startX + btnW * 3 + gap * 2) difficulty = 'hard';
    }
    return;
  }
  if (state === 'gameOver') { resetToStart(); return; }
  if (state === 'review') { onReviewDone(); return; }
  touchX = t.clientX;
  touchActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchActive) touchX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchX = null;
}, { passive: false });

canvas.addEventListener('click', e => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (state === 'start') {
    const cx = W / 2, cy = H * 0.62;
    if (Math.abs(e.clientX - cx) < 100 && Math.abs(e.clientY - cy) < 30) { startGame(); return; }
    const btnY = H * 0.74;
    const btnW = 70, gap = 15;
    const totalW = btnW * 3 + gap * 2;
    const startX = (W - totalW) / 2;
    if (e.clientY > btnY - 20 && e.clientY < btnY + 20) {
      if (e.clientX > startX && e.clientX < startX + btnW) difficulty = 'easy';
      else if (e.clientX > startX + btnW + gap && e.clientX < startX + btnW * 2 + gap) difficulty = 'medium';
      else if (e.clientX > startX + btnW * 2 + gap * 2 && e.clientX < startX + btnW * 3 + gap * 2) difficulty = 'hard';
    }
  }
  if (state === 'gameOver') resetToStart();
  if (state === 'review') onReviewDone();
});
</script>
<script>
// ===== GAME FUNCTIONS =====
function getDiffSettings() {
  if (difficulty === 'easy') return { distractors: 2, baseSpeed: 0.7, speedInc: 0.04, spawnInterval: 2.5 };
  if (difficulty === 'hard') return { distractors: 4, baseSpeed: 1.4, speedInc: 0.08, spawnInterval: 1.4 };
  return { distractors: 3, baseSpeed: 1.0, speedInc: 0.06, spawnInterval: 1.8 };
}

function startGame() {
  score = 0; lives = 3; combo = 0; maxCombo = 0;
  wordIndex = -1; phaseNumber = 0;
  roundHistory = [];
  playerX = W / 2; playerTargetX = W / 2;
  pickNewWord();
  // First game: show banner then countdown
  showBanner(`"${baseWord.word.toUpperCase()}" — Catch the SYNONYMS!`);
  startMusic();
}

function resetToStart() {
  state = 'start';
  stopMusic();
  initStartScreenWords();
}

function pickNewWord() {
  wordIndex = (wordIndex + 1) % WORDS.length;
  if (wordIndex === 0 && roundHistory.length > 0) {
    WORDS.sort(() => Math.random() - 0.5);
  }
  baseWord = WORDS[wordIndex];
  phase = 'synonym';
  caughtSynonyms = new Set();
  caughtAntonyms = new Set();
  setupPhase();
}

function setupPhase() {
  phaseNumber++;
  const settings = getDiffSettings();
  const speedMult = settings.baseSpeed + Math.floor(phaseNumber / 6) * settings.speedInc;

  challengeType = phase;
  const correctList = phase === 'synonym' ? [...baseWord.synonyms] : [...baseWord.antonyms];
  correctsNeeded = [...correctList];
  correctsCaught = 0;

  // Build distractor pool
  const allOtherWords = [];
  WORDS.forEach((entry, idx) => {
    if (entry.word !== baseWord.word) {
      allOtherWords.push(...entry.synonyms, ...entry.antonyms);
    }
  });
  // Also add the opposite type as distractors
  const wrongList = phase === 'synonym' ? baseWord.antonyms : baseWord.synonyms;
  allOtherWords.push(...wrongList);

  const shuffled = allOtherWords.sort(() => Math.random() - 0.5);
  const used = new Set(correctList.map(w => w.toLowerCase()));
  const distractors = [];
  for (const w of shuffled) {
    if (!used.has(w.toLowerCase())) { distractors.push(w); used.add(w.toLowerCase()); }
    if (distractors.length >= settings.distractors) break;
  }

  // Build spawn queue: all correct words + distractors, shuffled
  const allWords = [
    ...correctList.map(t => ({ text: t, isCorrect: true })),
    ...distractors.map(t => ({ text: t, isCorrect: false }))
  ];
  // Shuffle
  for (let i = allWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
  }

  const centerZone = W * 0.5;
  const padding = (W - centerZone) / 2;

  spawnQueue = allWords.map(w => {
    const xPos = padding + Math.random() * centerZone;
    return {
      text: w.text, isCorrect: w.isCorrect,
      x: Math.max(padding, Math.min(W - padding, xPos)),
      y: -40,
      speed: (0.7 + Math.random() * 0.8) * speedMult,
      color: PILL_COLORS[Math.floor(Math.random() * PILL_COLORS.length)],
      rotation: 0,
      rotSpeed: 0,
      width: 0, height: 36, caught: false, missed: false,
      spawned: true
    };
  });

  ctx.font = `bold ${16 * scale}px Nunito, sans-serif`;
  spawnQueue.forEach(fw => { fw.width = ctx.measureText(fw.text).width + 36; });

  fallingWords = [];
  spawnCooldown = 0;
  roundTimer = 0;
}

function showBanner(text) {
  bannerText = text;
  bannerTimer = 0;
  state = 'banner';
}

function startPhaseAfterBanner() {
  state = 'countdown';
  countdownValue = 3;
  countdownTimer = 0;
}

function onPhaseComplete() {
  if (phase === 'synonym') {
    // Move to antonym phase
    phase = 'antonym';
    setupPhase();
    showBanner(`Round ${phaseNumber}: Catch the ANTONYMS!`);
  } else {
    // Word mastered!
    score += 50;
    roundHistory.push({
      baseWord: baseWord.word,
      synonyms: [...baseWord.synonyms],
      antonyms: [...baseWord.antonyms]
    });
    state = 'mastered';
    masteredTimer = 0;
    // Spawn confetti burst
    confetti = [];
    for (let i = 0; i < 60; i++) {
      confetti.push({
        x: W / 2 + (Math.random() - 0.5) * 100,
        y: H * 0.3,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 6 - 2,
        size: 4 + Math.random() * 6,
        color: ['#FFD700','#FF69B4','#87CEEB','#98FB98','#FFB347','#DDA0DD','#FF6B6B'][Math.floor(Math.random() * 7)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        life: 1
      });
    }
  }
}

function onMasteredDone() {
  pickNewWord();
  showBanner(`"${baseWord.word.toUpperCase()}" — Catch the SYNONYMS!`);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4 - 2,
      life: 1, decay: 0.02 + Math.random() * 0.02, color, size: 3 + Math.random() * 4
    });
  }
}

function addFloatingText(text, x, y, color) {
  floatingTexts.push({ text, x, y, alpha: 1, vy: -1.5, color, scale: 1.5 });
}

function loseLife() {
  lives--;
  combo = 0;
  screenShake = 10;
  flashColor = 'rgba(220,80,80,';
  flashAlpha = 0.2;
  playSound('wrong');
  // Don't immediately go to gameOver — let review screen handle it
}

function showReview() {
  state = 'review';
  reviewTimer = 0;
  fallingWords = [];
  spawnQueue = [];
}

function onReviewDone() {
  if (lives <= 0) {
    state = 'gameOver';
    stopMusic();
    if (score > highScore) { highScore = score; localStorage.setItem('wordCatchHigh', highScore); }
  } else {
    pickNewWord();
    showBanner(`"${baseWord.word.toUpperCase()}" — Catch the SYNONYMS!`);
  }
}

<script>
// ===== UPDATE =====
let lastTime = 0;
function update(dt) {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay;
    return p.life > 0;
  });
  floatingTexts = floatingTexts.filter(ft => {
    ft.y += ft.vy; ft.alpha -= 0.015; ft.scale *= 0.995;
    return ft.alpha > 0;
  });
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;
  if (flashAlpha > 0) flashAlpha -= 0.01;
  if (catMouthTimer > 0) { catMouthTimer -= dt; if (catMouthTimer <= 0) catMouthOpen = false; }

  if (state === 'start') {
    startScreenWords.forEach(sw => {
      sw.y += sw.speed;
      if (sw.y > H + 30) {
        sw.y = -30; sw.x = Math.random() * W;
        const entry = WORDS[Math.floor(Math.random() * WORDS.length)];
        const allW = [...entry.synonyms, ...entry.antonyms, entry.word];
        sw.text = allW[Math.floor(Math.random() * allW.length)];
        sw.color = PILL_COLORS[Math.floor(Math.random() * PILL_COLORS.length)];
      }
    });
    return;
  }

  if (state === 'countdown') {
    countdownTimer += dt;
    if (countdownTimer > 1) {
      countdownTimer = 0;
      if (countdownValue > 1) { countdownValue--; playSound('countdown'); }
      else { state = 'playing'; playSound('go'); }
    }
    return;
  }

  if (state === 'banner') {
    bannerTimer += dt;
    if (bannerTimer > 1.5) {
      startPhaseAfterBanner();
    }
    return;
  }

  if (state === 'mastered') {
    masteredTimer += dt;
    // Update confetti
    confetti = confetti.filter(c => {
      c.x += c.vx; c.y += c.vy; c.vy += 0.15; c.rotation += c.rotSpeed; c.life -= 0.008;
      return c.life > 0;
    });
    if (masteredTimer > 2.5) {
      onMasteredDone();
    }
    return;
  }

  if (state === 'review') {
    reviewTimer += dt;
    return;
  }

  if (state !== 'playing') return;

  const speed = 8;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) playerTargetX -= speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) playerTargetX += speed;
  if (touchActive && touchX !== null) playerTargetX = touchX;
  playerTargetX = Math.max(25, Math.min(W - 25, playerTargetX));
  playerX += (playerTargetX - playerX) * 0.15;

  const playerY = H * 0.88;
  const playerW = 80, playerH = 80;

  // Spawn words from queue — only if no active word is still near the top
  const settings = getDiffSettings();
  spawnCooldown -= dt;
  if (spawnCooldown <= 0 && spawnQueue.length > 0) {
    // Check that no active word is above 30% of screen height to avoid overlap
    const topClear = fallingWords.every(fw => fw.caught || fw.missed || fw.y > H * 0.3);
    if (topClear) {
      fallingWords.push(spawnQueue.shift());
      spawnCooldown = settings.spawnInterval * (0.7 + Math.random() * 0.6);
    }
  }

  // Update falling words
  fallingWords.forEach(fw => {
    if (fw.caught || fw.missed) return;
    fw.y += fw.speed;
    fw.rotation += fw.rotSpeed;
    const fwLeft = fw.x - fw.width / 2, fwRight = fw.x + fw.width / 2;
    const fwTop = fw.y - fw.height / 2, fwBottom = fw.y + fw.height / 2;
    const pLeft = playerX - playerW / 2, pRight = playerX + playerW / 2;
    const pTop = playerY - playerH / 2, pBottom = playerY + playerH / 2;

    if (fwRight > pLeft && fwLeft < pRight && fwBottom > pTop && fwTop < pBottom) {
      fw.caught = true;
      catMouthOpen = true;
      catMouthTimer = 0.4;
      if (fw.isCorrect) {
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const mult = Math.min(combo, 5);
        score += 10 * mult;
        correctsCaught++;
        // Track which words were caught for review
        if (challengeType === 'synonym') caughtSynonyms.add(fw.text.toLowerCase());
        else caughtAntonyms.add(fw.text.toLowerCase());
        flashColor = 'rgba(144,213,150,';
        flashAlpha = 0.15;
        playSound('correct');
        if (combo >= 3 && combo % 2 === 1) playSound('combo');
        spawnParticles(fw.x, fw.y, MINT, 15);
        addFloatingText(`✅ +${10 * mult}`, fw.x, fw.y - 20, '#5A9E6F');
        if (mult > 1) addFloatingText(`x${mult}`, fw.x, fw.y - 45, WARM_BROWN);
        // Check if all correct words caught
        if (correctsCaught >= correctsNeeded.length) {
          // Phase complete!
          setTimeout(() => { if (state === 'playing') onPhaseComplete(); }, 600);
        }
      } else {
        spawnParticles(fw.x, fw.y, ROSE, 12);
        addFloatingText('❌ Wrong!', fw.x, fw.y - 20, '#C0616E');
        loseLife();
      }
    }
    if (fw.y > H + 40) {
      fw.missed = true;
      // If a correct word was missed, lose a life
      if (fw.isCorrect) {
        addFloatingText('💨 Missed!', fw.x, H - 100, WARM_BROWN);
        loseLife();
      }
    }
  });

  // Clean up off-screen words
  fallingWords = fallingWords.filter(fw => !(fw.missed && fw.y > H + 80));

  // If all words are gone but we haven't caught all correct ones, show review
  if (spawnQueue.length === 0 && correctsCaught < correctsNeeded.length) {
    const allDone = fallingWords.every(fw => fw.caught || fw.missed);
    if (allDone) {
      showReview();
    }
  }

  // If lives ran out during play, immediately show review
  if (lives <= 0 && state === 'playing') {
    showReview();
  }
}
</script>
<script>
// ===== DRAW HELPERS =====
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arc(x + w - r, y + r, r, -Math.PI/2, 0);
  ctx.lineTo(x + w, y + h - r);
  ctx.arc(x + w - r, y + h - r, r, 0, Math.PI/2);
  ctx.lineTo(x + r, y + h);
  ctx.arc(x + r, y + h - r, r, Math.PI/2, Math.PI);
  ctx.lineTo(x, y + r);
  ctx.arc(x + r, y + r, r, Math.PI, Math.PI * 1.5);
  ctx.closePath();
}

// ===== BACKGROUND (image asset) =====
function drawBackground() {
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    // Cover the canvas while preserving aspect ratio
    const imgRatio = bgImg.naturalWidth / bgImg.naturalHeight;
    const canvasRatio = W / H;
    let drawW, drawH, drawX, drawY;
    if (canvasRatio > imgRatio) {
      drawW = W; drawH = W / imgRatio;
      drawX = 0; drawY = (H - drawH) / 2;
    } else {
      drawH = H; drawW = H * imgRatio;
      drawX = (W - drawW) / 2; drawY = 0;
    }
    ctx.drawImage(bgImg, drawX, drawY, drawW, drawH);
  } else {
    // Fallback while loading
    ctx.fillStyle = '#90C880';
    ctx.fillRect(0, 0, W, H);
  }
}
</script>
<script>
// ===== DRAW PILL (kawaii style with warm brown outline) =====
function drawPill(x, y, w, h, color, text, rotation) {
  ctx.save();
  ctx.translate(x, y);
  if (rotation) ctx.rotate(rotation);

  const r = h / 2;

  // Soft shadow
  ctx.shadowColor = 'rgba(139,107,74,0.2)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;

  // Pill fill
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w/2 + r, -h/2);
  ctx.lineTo(w/2 - r, -h/2);
  ctx.arc(w/2 - r, 0, r, -Math.PI/2, Math.PI/2);
  ctx.lineTo(-w/2 + r, h/2);
  ctx.arc(-w/2 + r, 0, r, Math.PI/2, -Math.PI/2);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // Warm brown outline
  ctx.strokeStyle = WARM_BROWN;
  ctx.lineWidth = OUTLINE_W;
  ctx.beginPath();
  ctx.moveTo(-w/2 + r, -h/2);
  ctx.lineTo(w/2 - r, -h/2);
  ctx.arc(w/2 - r, 0, r, -Math.PI/2, Math.PI/2);
  ctx.lineTo(-w/2 + r, h/2);
  ctx.arc(-w/2 + r, 0, r, Math.PI/2, -Math.PI/2);
  ctx.closePath();
  ctx.stroke();

  // Text
  ctx.fillStyle = DARK_BROWN;
  ctx.font = `bold ${16 * Math.min(scale, 1.3)}px Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 0, 1);

  ctx.restore();
}

// ===== CAT CHARACTER (image assets) =====
function drawPlayer(x, y) {
  const img = catMouthOpen ? catOpenImg : catDefaultImg;
  if (img.complete && img.naturalWidth > 0) {
    const catW = 100 * Math.min(scale, 1.3);
    const catH = catW * (img.naturalHeight / img.naturalWidth);
    // Draw so the cat's bottom aligns with y
    ctx.drawImage(img, x - catW / 2, y - catH, catW, catH);
  }
}

// ===== HUD =====
function drawHUD() {
  // Score
  ctx.fillStyle = WARM_BROWN;
  ctx.font = `bold ${20 * Math.min(scale, 1.2)}px Fredoka One, Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`⭐ SCORE: ${score}`, W / 2, 30);

  // Lives and combo
  let heartsStr = '';
  for (let i = 0; i < 3; i++) heartsStr += i < lives ? '❤️' : '🤍';
  ctx.font = `${18 * Math.min(scale, 1.2)}px Nunito, sans-serif`;
  ctx.fillStyle = DARK_BROWN;
  const comboStr = combo > 1 ? `  x${Math.min(combo, 5)} COMBO` : '';
  ctx.fillText(heartsStr + comboStr, W / 2, 55);

  // Combo glow
  if (combo >= 3) {
    ctx.save();
    const glowIntensity = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.shadowColor = ROSE;
    ctx.shadowBlur = 12 * glowIntensity;
    ctx.fillStyle = WARM_BROWN;
    ctx.font = `bold ${16 * Math.min(scale, 1.2)}px Fredoka One, Nunito, sans-serif`;
    ctx.fillText(`🔥 ${combo} STREAK`, W / 2, 78);
    ctx.restore();
  }

  // Base word and challenge
  if (baseWord && state === 'playing') {
    const cardW = 260 * Math.min(scale, 1.2);
    const cardH = 68;
    const cardX = W/2 - cardW/2;
    const cardY = 88;
    ctx.fillStyle = 'rgba(255,245,230,0.85)';
    ctx.strokeStyle = LIGHT_BROWN;
    ctx.lineWidth = 2;
    roundRect(cardX, cardY, cardW, cardH, 14);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = DARK_BROWN;
    ctx.font = `bold ${24 * Math.min(scale, 1.3)}px Fredoka One, Nunito, sans-serif`;
    ctx.fillText(`"${baseWord.word.toUpperCase()}"`, W / 2, 110);

    const typeColor = challengeType === 'synonym' ? '#5A9E6F' : '#C0616E';
    ctx.fillStyle = typeColor;
    ctx.font = `bold ${14 * Math.min(scale, 1.2)}px Nunito, sans-serif`;
    ctx.fillText(`🎯 Catch the ${challengeType.toUpperCase()}S!  (${correctsCaught}/${correctsNeeded.length})`, W / 2, 134);

    // Progress dots
    const dotY = 148;
    const dotR = 5;
    const dotGap = 14;
    const totalDotsW = (correctsNeeded.length - 1) * dotGap;
    const dotStartX = W / 2 - totalDotsW / 2;
    for (let i = 0; i < correctsNeeded.length; i++) {
      ctx.beginPath();
      ctx.arc(dotStartX + i * dotGap, dotY, dotR, 0, Math.PI * 2);
      ctx.fillStyle = i < correctsCaught ? typeColor : 'rgba(139,107,74,0.2)';
      ctx.fill();
    }
  }

  // Phase number
  if (phaseNumber > 0) {
    ctx.fillStyle = 'rgba(139,107,74,0.4)';
    ctx.font = `${12 * Math.min(scale, 1.2)}px Nunito, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`Phase ${phaseNumber}`, W - 15, 25);
    ctx.textAlign = 'center';
  }

  // High score
  ctx.fillStyle = 'rgba(139,107,74,0.4)';
  ctx.font = `${12 * Math.min(scale, 1.2)}px Nunito, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`HI: ${highScore}`, 15, 25);
  ctx.textAlign = 'center';
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.globalAlpha = ft.alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${20 * ft.scale * Math.min(scale, 1.2)}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  });
  ctx.globalAlpha = 1;
}

    ctx.font = `${12 * Math.min(scale, 1.1)}px Nunito, sans-serif`;
    for (let i = 0; i < maxShow; i++) {
      const rh = roundHistory[startIdx + i];
      const yPos = cardY + 220 + i * 20;
      ctx.fillStyle = 'rgba(92,61,46,0.6)';
      ctx.fillText(`${rh.baseWord.toUpperCase()} ✓`, W / 2, yPos);
    }
    if (roundHistory.length > 5) {
      ctx.fillStyle = 'rgba(139,107,74,0.4)';
      ctx.fillText(`...and ${roundHistory.length - 5} more`, W / 2, cardY + 220 + maxShow * 20);
    }
  }

  // Play Again button
  const btnY = cardY + cardH - 40;
  drawKawaiiBtn(W / 2, btnY, 200, 46, BABY_BLUE, WARM_BROWN, '🔄 Play Again', DARK_BROWN);
}
</script>
<script>
function drawBanner() {
  drawBackground();
  drawHUD();
  drawPlayer(playerX, H * 0.88);

  // Slide-in banner with bounce
  const progress = Math.min(bannerTimer / 0.5, 1);
  const bounce = progress < 1 ? (1 - Math.pow(1 - progress, 3)) * 1.1 - 0.1 * Math.sin(progress * Math.PI) : 1;
  const bannerY = H * 0.4;
  const bannerW = Math.min(W * 0.9, 360);
  const bannerH = 56;
  const slideX = W / 2 + (W * 0.6) * (1 - bounce);

  ctx.save();
  ctx.shadowColor = 'rgba(139,107,74,0.3)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = challengeType === 'synonym' ? '#E8F5E9' : '#FCE4EC';
  ctx.strokeStyle = challengeType === 'synonym' ? '#5A9E6F' : '#C0616E';
  ctx.lineWidth = 3;
  roundRect(slideX - bannerW / 2, bannerY - bannerH / 2, bannerW, bannerH, bannerH / 2);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  ctx.fillStyle = challengeType === 'synonym' ? '#2E7D32' : '#AD1457';
  ctx.font = `bold ${18 * Math.min(scale, 1.2)}px Fredoka One, Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(bannerText, slideX, bannerY + 2);
}

function drawMastered() {
  drawBackground();

  // Confetti
  confetti.forEach(c => {
    ctx.save();
    ctx.globalAlpha = c.life;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
    ctx.restore();
  });
  ctx.globalAlpha = 1;

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, W, H);

  // Cat celebrate image
  if (catCelebrateImg.complete && catCelebrateImg.naturalWidth > 0) {
    const cw = 90 * Math.min(scale, 1.3);
    const ch = cw * (catCelebrateImg.naturalHeight / catCelebrateImg.naturalWidth);
    ctx.drawImage(catCelebrateImg, W / 2 - cw / 2, H * 0.12, cw, ch);
  }

  // Pop-in card
  const progress = Math.min(masteredTimer / 0.4, 1);
  const popScale = progress < 1 ? 0.5 + 0.5 * (1 - Math.pow(1 - progress, 3)) : 1;

  ctx.save();
  ctx.translate(W / 2, H * 0.5);
  ctx.scale(popScale, popScale);

  const cardW = Math.min(W * 0.85, 320);
  const cardH = 240;

  ctx.shadowColor = 'rgba(139,107,74,0.3)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#FFF8F0';
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 20);
  ctx.fill(); ctx.stroke();
  ctx.shadowColor = 'transparent';

  // Title
  ctx.fillStyle = DARK_BROWN;
  ctx.font = `bold ${20 * Math.min(scale, 1.3)}px Fredoka One, Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`✨ "${baseWord.word.toUpperCase()}" Mastered!`, 0, -cardH / 2 + 35);

  // Synonyms
  ctx.fillStyle = '#5A9E6F';
  ctx.font = `bold ${12 * Math.min(scale, 1.1)}px Nunito, sans-serif`;
  ctx.fillText('Synonyms:', 0, -cardH / 2 + 62);
  const synY = -cardH / 2 + 82;
  baseWord.synonyms.forEach((s, i) => {
    const pw = ctx.measureText(s).width + 22;
    const totalW = baseWord.synonyms.length * 72;
    const px = -totalW / 2 + i * 72 + 36;
    drawPill(px, synY, pw, 26, MINT, s, 0);
  });

  // Antonyms
  ctx.fillStyle = '#C0616E';
  ctx.font = `bold ${12 * Math.min(scale, 1.1)}px Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Antonyms:', 0, -cardH / 2 + 115);
  const antY = -cardH / 2 + 135;
  baseWord.antonyms.forEach((a, i) => {
    const pw = ctx.measureText(a).width + 22;
    const totalW = baseWord.antonyms.length * 72;
    const px = -totalW / 2 + i * 72 + 36;
    drawPill(px, antY, pw, 26, SOFT_PINK, a, 0);
  });

  // Bonus text
  ctx.fillStyle = WARM_BROWN;
  ctx.font = `bold ${16 * Math.min(scale, 1.2)}px Nunito, sans-serif`;
  ctx.fillText('🎉 Word Complete! +50 bonus', 0, cardH / 2 - 30);

  ctx.restore();
}

function drawReview() {
  drawBackground();

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  // Cat relearn image
  if (catRelearnImg.complete && catRelearnImg.naturalWidth > 0) {
    const cw = 80 * Math.min(scale, 1.3);
    const ch = cw * (catRelearnImg.naturalHeight / catRelearnImg.naturalWidth);
    ctx.drawImage(catRelearnImg, W / 2 - cw / 2, H * 0.06, cw, ch);
  }

  // Pop-in card
  const progress = Math.min(reviewTimer / 0.4, 1);
  const popScale = progress < 1 ? 0.5 + 0.5 * (1 - Math.pow(1 - progress, 3)) : 1;

  ctx.save();
  ctx.translate(W / 2, H * 0.48);
  ctx.scale(popScale, popScale);

  const cardW = Math.min(W * 0.88, 330);
  const cardH = 310;

  ctx.shadowColor = 'rgba(139,107,74,0.3)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#FFF8F0';
  ctx.strokeStyle = ROSE;
  ctx.lineWidth = 3;
  roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 20);
  ctx.fill(); ctx.stroke();
  ctx.shadowColor = 'transparent';

  // Title
  ctx.fillStyle = DARK_BROWN;
  ctx.font = `bold ${20 * Math.min(scale, 1.3)}px Fredoka One, Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`📖 Let's Review!`, 0, -cardH / 2 + 35);

  // Base word
  ctx.fillStyle = WARM_BROWN;
  ctx.font = `bold ${22 * Math.min(scale, 1.3)}px Fredoka One, Nunito, sans-serif`;
  ctx.fillText(`"${baseWord.word.toUpperCase()}"`, 0, -cardH / 2 + 62);

  // Synonyms section
  ctx.fillStyle = '#5A9E6F';
  ctx.font = `bold ${12 * Math.min(scale, 1.1)}px Nunito, sans-serif`;
  ctx.fillText('Synonyms:', 0, -cardH / 2 + 90);
  const synY = -cardH / 2 + 112;
  baseWord.synonyms.forEach((s, i) => {
    const caught = caughtSynonyms.has(s.toLowerCase());
    const pw = ctx.measureText(s).width + 22;
    const totalW = baseWord.synonyms.length * 72;
    const px = -totalW / 2 + i * 72 + 36;
    if (caught) {
      drawPill(px, synY, pw, 26, MINT, s, 0);
    } else {
      // Dimmed outline for missed words
      ctx.save();
      ctx.globalAlpha = 0.4;
      drawPill(px, synY, pw, 26, '#e0e0e0', s, 0);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  });

  // Antonyms section
  ctx.fillStyle = '#C0616E';
  ctx.font = `bold ${12 * Math.min(scale, 1.1)}px Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Antonyms:', 0, -cardH / 2 + 148);
  const antY = -cardH / 2 + 170;
  baseWord.antonyms.forEach((a, i) => {
    const caught = caughtAntonyms.has(a.toLowerCase());
    const pw = ctx.measureText(a).width + 22;
    const totalW = baseWord.antonyms.length * 72;
    const px = -totalW / 2 + i * 72 + 36;
    if (caught) {
      drawPill(px, antY, pw, 26, SOFT_PINK, a, 0);
    } else {
      ctx.save();
      ctx.globalAlpha = 0.4;
      drawPill(px, antY, pw, 26, '#e0e0e0', a, 0);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  });

  // Button
  if (lives > 0) {
    drawKawaiiBtn(0, cardH / 2 - 40, 220, 42, BABY_BLUE, WARM_BROWN, 'Got it! Next word →', DARK_BROWN);
  } else {
    drawKawaiiBtn(0, cardH / 2 - 40, 220, 42, SOFT_PINK, WARM_BROWN, 'View Results', DARK_BROWN);
  }

  ctx.restore();
}

// ===== GAME LOOP =====
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  resize();
  update(dt);

  ctx.clearRect(0, 0, W, H);

  switch (state) {
    case 'start': drawStartScreen(); break;
    case 'countdown': drawCountdown(); break;
    case 'banner': drawBanner(); break;
    case 'playing': drawGameplay(); break;
    case 'mastered': drawMastered(); break;
    case 'review': drawReview(); break;
    case 'gameOver': drawGameOver(); break;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
